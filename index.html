<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lottery Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">Dark Mode</button>
  <h1>Lottery Number Generator</h1>
  <button id="generator-btn">Generate Numbers</button>
  <div id="numbers-container"></div>

  <section id="contact-section">
    <h2>Partnership Inquiry</h2>
    <form action="https://formspree.io/f/xyklgqak" method="POST">
      <div class="form-group">
        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" required placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label for="message">Message:</label>
        <textarea id="message" name="message" required placeholder="Enter your inquiry here..."></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </section>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
